name: 'Prepare ImmortalWrt SDK'
description: 'Unified SDK preparation for multiple architectures'
inputs:
  sdk_name:
    description: 'The full name of the SDK tarball (without extension)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Download and Initialize SDK
      shell: bash
      run: |
        set -e
        
        SDK_NAME="${{ inputs.sdk_name }}"
        BASE_NAME=${SDK_NAME%%_gcc*} 
        SUBTARGET=${BASE_NAME##*-}
        TEMP_NAME=${BASE_NAME%-*}
        TARGET=${TEMP_NAME##*-}
        SDK_VERSION=${TEMP_NAME%-*}
        SDK_VERSION=${SDK_VERSION#immortalwrt-sdk-}
      
        curl -LO "https://downloads.immortalwrt.org/releases/$SDK_VERSION/targets/$TARGET/$SUBTARGET/$SDK_NAME.tar.zst"
        tar -xvf "${{ inputs.sdk_name }}.tar.zst"
        rm "${{ inputs.sdk_name }}.tar.zst"

        cd "${{ inputs.sdk_name }}"
        make defconfig
        ./scripts/feeds update -a
        ./scripts/feeds install -a
