name: 'Clone Source Code'
description: 'Clone Source Code'
inputs:
  sdk_name:
    required: true
  project_name:
    required: true
runs:
  using: "composite"
  steps:
    - name: Clone Source Code
      shell: bash
      run: |
          set -e
          cd ${{ inputs.sdk_name }}/package/
          rm -rf ${{ inputs.project_name }}
          git clone --depth 1 https://github.com/mokanove/${{ inputs.project_name }}.git
