name: 'Build'
description: 'Build'
inputs:
  sdk_name:
    required: true
  project_name:
    required: true
runs:
  using: "composite"
  steps:
    - name: Build
      shell: bash
      run: |
          set -e

          cd ${{ inputs.sdk_name }}
          make package/${{ inputs.project_name }}/compile V=s -j$(nproc)
