name: 'Prepare ImmortalWrt 24.10.5 SDK'
description: 'Prepare ImmortalWrt 24.10.5 X86_64 SDK'
runs:
  using: "composite"
  steps:
    - name: Install Build Dependencies
      shell: bash
      run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev \
          zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget curl unzip python3

    - name: Clone ImmortalWrt 24.10.5 X86_64 SDK & init
      shell: bash
      run: |
          curl -LO https://immortalwrt.kyarucloud.moe/releases/24.10.5/targets/x86/64/immortalwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          tar -xvf immortalwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          rm immortalwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          cd immortalwrt-sdk-24.10.5-x86-64_gcc-13.3.0_musl.Linux-x86_64
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
